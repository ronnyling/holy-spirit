# Neo4j 5 — native property graph + native vector index in a single engine.
# This is the committed storage engine for the Continuous R&D Knowledge Engine.
# Start with:  docker compose up -d
# Browser UI:  http://localhost:7474   (user: neo4j, password: knowledge-engine)

services:
  neo4j:
    image: neo4j:5.24-community
    container_name: knowledge-engine-neo4j
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt (driver protocol)
    environment:
      NEO4J_AUTH: "neo4j/knowledge-engine"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j-data:
  neo4j-logs:
